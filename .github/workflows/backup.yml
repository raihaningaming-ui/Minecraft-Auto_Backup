name: Minecraft Auto Backup

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y sshpass zip python3-pip

      - name: Download world from server
        run: |
          mkdir backup
          sshpass -p "${{ secrets.SFTP_PASS }}" scp -o StrictHostKeyChecking=no -r \
          ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/world ./backup/

      - name: Create ZIP
        run: zip -r mc-backup.zip backup

      - name: Upload to Google Drive
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > creds.json
          pip install google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib
          python3 upload.py
